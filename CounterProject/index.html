<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    
  <div class="page-center">
    <div class="counter-card">
      <h1 class="Counter">0</h1>
      <div class="controls" role="group" aria-label="Counter controls">
        <div class="Increase" role="button" onclick="increaseCounter()" tabindex="0">Increase</div>
        <div class="Reset" role="button" onclick="resetCounter()" tabindex="0">Reset</div>
        <div class="Decrease" role="button" onclick="decreaseCounter()" tabindex="0">Decrease</div>
      </div>
    </div>
  </div>



    <script type="text/javascript" src="count.js"></script>
</body>
</html>
